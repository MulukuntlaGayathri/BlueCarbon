<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Investor View - Projects</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
    h2 { text-align: center; }
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
    .card h3 { margin: 10px 0 5px; }
    .btn { display: inline-block; margin-top: 10px; padding: 8px 12px; background: green; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .btn:hover { background: darkgreen; }
  </style>
</head>
<body>

  <div style="margin-bottom:15px; text-align:right;">
    <a href="index.html" style="color:#0b63d6; font-weight:bold; text-decoration:none;">🏠 Back to Home</a>
  </div>

  <h2>Available Projects for Investment</h2>
  <div class="container" id="projectContainer"></div>

  <script>
    async function loadProjects() {
      const container = document.getElementById('projectContainer');
      container.innerHTML = '';

      try {
        const res = await fetch('http://localhost:5000/api/projects');
        const projects = await res.json();

        if (!projects || projects.length === 0) {
          container.innerHTML = "<p>No projects available.</p>";
          return;
        }

        projects.forEach((p, index) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="https://via.placeholder.com/300" alt="Project Image">
            <h3>${p.name}</h3>
            <p><strong>Location:</strong> ${p.location}</p>
            <p><strong>Carbon Credits:</strong> ${p.carbon_rate_tons}</p>
            <button class="btn" onclick="buyCredits(${index}, '${p.id}')">Buy Credits</button>
          `;
          container.appendChild(card);
        });

      } catch (err) {
        container.innerHTML = "<p>❌ Failed to load projects: " + err.message + "</p>";
      }
    }

    async function buyCredits(index, projectId) {
      alert("✅ Bought credits from project ID: " + projectId + " (simulated)");
      // Optional: POST request to backend to record purchase
    }

    document.addEventListener('DOMContentLoaded', loadProjects);
  </script>

</body>
</html>
