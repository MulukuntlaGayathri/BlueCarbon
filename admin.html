<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Admin Dashboard - Carbon Projects</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#f6f9fc;--card:#fff;--muted:#666;--accent:#0b63d6;--green:#16a34a}
    body{font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);margin:20px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    header h1{font-size:20px;margin:0}
    .top {display:flex;gap:18px;flex-wrap:wrap;margin-bottom:18px}
    .summary{display:flex;gap:12px;width:100%;flex-wrap:wrap}
    .card{background:var(--card);padding:16px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06);min-width:140px;flex:1}
    .card .big{font-size:22px;font-weight:700}
    .controls{display:flex;gap:8px;align-items:center}
    input[type="text"], select{padding:8px;border:1px solid #d7e1ef;border-radius:8px}
    .main{display:grid;grid-template-columns:1fr 420px;gap:18px;align-items:start}
    .tableWrap{background:var(--card);padding:14px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px 6px;text-align:left;border-bottom:1px solid #eef3fb;font-size:13px}
    th{color:var(--muted);font-weight:600}
    .actions button{margin-right:6px;padding:6px 8px;border-radius:6px;border:none;cursor:pointer}
    .btn-danger{background:#ef4444;color:white}
    .btn-view{background:var(--accent);color:white}
    canvas{background:var(--card);padding:8px;border-radius:8px}
    .empty{padding:24px;text-align:center;color:var(--muted)}
    @media (max-width:920px){ .main{grid-template-columns:1fr} }
  </style>
</head>
<body>

  <header>
    <h1>Admin Dashboard — Carbon Projects</h1>
    <div>
      <a href="index.html">← Home</a>
    </div>
  </header>

  <div class="top">
    <div class="summary">
      <div class="card">
        <div style="color:var(--muted)">Total Projects</div>
        <div id="totalProjects" class="big">0</div>
      </div>
      <div class="card">
        <div style="color:var(--muted)">Total Carbon Credits</div>
        <div id="totalCredits" class="big">0</div>
      </div>
      <div class="card">
        <div style="color:var(--muted)">Average Credits / Project</div>
        <div id="avgCredits" class="big">0</div>
      </div>
    </div>

    <div style="flex-basis:100%"></div>

    <div class="card" style="min-width:260px;">
      <div style="color:var(--muted);margin-bottom:8px">Search & Filters</div>
      <div class="controls">
        <input id="searchInput" type="text" placeholder="Search name / description" style="flex:1" />
        <select id="locationFilter">
          <option value="all">All locations</option>
        </select>
        <select id="sortSelect" title="Sort">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="credits_desc">Credits ↓</option>
          <option value="credits_asc">Credits ↑</option>
        </select>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- left: table -->
    <div class="tableWrap">
      <h3 style="margin-top:0">Projects</h3>
      <div id="tableContainer"></div>
    </div>

    <!-- right: charts -->
    <div>
      <div style="margin-bottom:14px" class="card">
        <div style="color:var(--muted)">Credits by Project (top 10)</div>
        <canvas id="creditsBar" width="400" height="240"></canvas>
      </div>

      <div style="margin-top:12px" class="card">
        <div style="color:var(--muted)">Credits by Location</div>
        <canvas id="locationPie" width="400" height="240"></canvas>
      </div>
    </div>
  </div>

<script>
let barChart = null, pieChart = null;

/* ========== API HELPERS ========== */
async function getProjects() {
  try {
    let res = await fetch("/api/projects");
    if (!res.ok) throw new Error("Failed to load projects");
    return await res.json();
  } catch (e) {
    console.error("Error fetching projects:", e);
    return [];
  }
}

async function deleteProject(id) {
  if(!confirm("Delete this project?")) return;
  try {
    let res = await fetch(`/api/projects/${id}`, { method: "DELETE" });
    if(res.ok) applyFilters();
  } catch(e) {
    console.error("Error deleting project:", e);
  }
}

/* Format date */
function fmtDate(iso) {
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString();
}

/* RENDER SUMMARY */
function renderSummary(list) {
  const totalProjects = list.length;
  const totalCredits = list.reduce((s,p)=> s + (Number(p.credits)||0), 0);
  const avgCredits = totalProjects? Math.round((totalCredits/totalProjects)*100)/100 : 0;
  document.getElementById('totalProjects').textContent = totalProjects;
  document.getElementById('totalCredits').textContent = totalCredits;
  document.getElementById('avgCredits').textContent = avgCredits;
}

/* RENDER TABLE */
function renderTable(list) {
  const container = document.getElementById('tableContainer');
  if(!list.length) {
    container.innerHTML = '<div class="empty">No projects to show.</div>';
    return;
  }

  let html = `<table>
    <thead><tr>
      <th>Name</th><th>Location</th><th>Credits</th><th>Created</th><th>Actions</th>
    </tr></thead>
    <tbody>`;

  for(const p of list) {
    html += `<tr>
      <td style="max-width:220px">${escapeHtml(p.name || '')}</td>
      <td>${escapeHtml(p.location || '')}</td>
      <td>${Number(p.credits)||0}</td>
      <td>${fmtDate(p.createdAt)}</td>
      <td class="actions">
        <button class="btn-view" data-id="${p.id}">View</button>
        <button class="btn-danger" data-id="${p.id}">Delete</button>
      </td>
    </tr>`;
  }

  html += `</tbody></table>`;
  container.innerHTML = html;

  container.querySelectorAll('.btn-view').forEach(b=>{
    b.addEventListener('click', ()=> {
      const id = b.dataset.id;
      const proj = list.find(x=>String(x.id)===String(id));
      if(proj) {
        alert(`Project: ${proj.name}\nLocation: ${proj.location}\nCredits: ${proj.credits}\n\n${proj.description}`);
      }
    });
  });

  container.querySelectorAll('.btn-danger').forEach(b=>{
    b.addEventListener('click', ()=> deleteProject(b.dataset.id));
  });
}

/* CHARTS */
function updateCharts(list) {
  const sorted = [...list].sort((a,b)=> (Number(b.credits)||0) - (Number(a.credits)||0)).slice(0,10);
  const labels = sorted.map(p => p.name || '—');
  const data = sorted.map(p => Number(p.credits)||0);

  if(barChart) barChart.destroy();
  const ctxBar = document.getElementById('creditsBar').getContext('2d');
  barChart = new Chart(ctxBar, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Credits', data, borderRadius:6 }]},
    options: {responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}}}
  });

  const map = {};
  for(const p of list) {
    const loc = p.location || 'Unknown';
    map[loc] = (map[loc] || 0) + (Number(p.credits)||0);
  }
  const locLabels = Object.keys(map);
  const locData = Object.values(map);

  if(pieChart) pieChart.destroy();
  const ctxPie = document.getElementById('locationPie').getContext('2d');
  pieChart = new Chart(ctxPie, {
    type: 'pie',
    data: { labels: locLabels, datasets: [{ data: locData }] },
    options: { responsive:true, plugins:{legend:{position:'bottom'}} }
  });
}

/* FILTERS & SORT */
let allProjects = [];

function populateLocationFilter(allProjects) {
  const sel = document.getElementById('locationFilter');
  const locs = Array.from(new Set(allProjects.map(p => p.location || 'Unknown'))).sort();
  sel.innerHTML = '<option value="all">All locations</option>' + locs.map(l=>`<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
}

function applyFilters() {
  const search = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const loc = document.getElementById('locationFilter').value;
  const sort = document.getElementById('sortSelect').value;

  let filtered = allProjects.filter(p=>{
    const hay = (p.name + ' ' + (p.description||'')).toLowerCase();
    return (!search || hay.includes(search)) && (loc === 'all' || (p.location || 'Unknown') === loc);
  });

  if(sort === 'credits_desc') filtered.sort((a,b)=> (Number(b.credits)||0) - (Number(a.credits)||0));
  else if(sort === 'credits_asc') filtered.sort((a,b)=> (Number(a.credits)||0) - (Number(b.credits)||0));
  else if(sort === 'newest') filtered.sort((a,b)=> new Date(b.createdAt) - new Date(a.createdAt));
  else if(sort === 'oldest') filtered.sort((a,b)=> new Date(a.createdAt) - new Date(b.createdAt));

  renderSummary(filtered);
  renderTable(filtered);
  updateCharts(filtered);
  populateLocationFilter(allProjects);
}

/* HELPER */
function escapeHtml(str) {
  if(!str) return '';
  return String(str)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

/* INIT */
document.getElementById('searchInput').addEventListener('input', ()=> applyFilters());
document.getElementById('locationFilter').addEventListener('change', ()=> applyFilters());
document.getElementById('sortSelect').addEventListener('change', ()=> applyFilters());

(async function init() {
  allProjects = await getProjects();
  applyFilters();
})();
</script>
</body>
</html>
